<ng-container *transloco="let t">
  <h2 mat-dialog-title>{{ isEdit() ? t('admin.groups.form.editTitle') : t('admin.groups.form.createTitle') }}</h2>
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ t('common.name') }}</mat-label>
      <input matInput [ngModel]="name()" (ngModelChange)="name.set($event)" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ t('common.description') }}</mat-label>
      <input matInput [ngModel]="description()" (ngModelChange)="description.set($event)" />
    </mat-form-field>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">{{ t('common.cancel') }}</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="saving()">
      @if (saving()) {
        <mat-spinner diameter="18"></mat-spinner>
      } @else {
        {{ isEdit() ? t('common.save') : t('common.create') }}
      }
    </button>
  </mat-dialog-actions>
</ng-container>
