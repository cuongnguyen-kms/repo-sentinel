<div class="header-row">
  <div>
    <h1>Permissions</h1>
    <p class="subtitle">Full read-only catalog of Resource &times; Action permissions available to assign to roles.</p>
  </div>
</div>

@if (loading()) {
  <mat-spinner diameter="32"></mat-spinner>
} @else {
  <table mat-table [dataSource]="permissions()" class="permissions-table">
    <ng-container matColumnDef="resource">
      <th mat-header-cell *matHeaderCellDef>Resource</th>
      <td mat-cell *matCellDef="let permission">{{ permission.resource }}</td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let permission">{{ permission.action }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
}
