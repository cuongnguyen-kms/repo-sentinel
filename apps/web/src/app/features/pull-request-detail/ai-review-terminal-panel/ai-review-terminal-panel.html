<div class="terminal-header">
  <div class="status-group">
    <span class="phase">{{ phase() }}</span>
    @if (thinkingLabel(); as label) {
      <span class="thinking">{{ label }}</span>
    }
    @if (tokenCount() > 0) {
      <span class="meta">Tokens: {{ tokenCount() }}</span>
    }
    @if (costUsd() !== null) {
      <span class="meta">Cost: ${{ costUsd() | number: '1.4-4' }}</span>
    }
    @if (durationMs() !== null) {
      <span class="meta">{{ durationMs()! / 1000 | number: '1.1-1' }}s</span>
    }
  </div>
  <button mat-button color="warn" (click)="cancel()" [disabled]="cancelling()">
    <mat-icon>stop</mat-icon>
    Cancel
  </button>
</div>
<div #terminalContainer class="terminal-container"></div>
