<mat-nav-list>
  @for (review of reviews(); track review.id) {
    <mat-list-item lines="2">
      <span matListItemTitle class="review-title">
        <app-ai-review-status-badge [status]="review.status" />
        Score: {{ review.score ?? '—' }}
      </span>
      <span matListItemLine>{{ review.createdAt | date: 'medium' }} — {{ review.commitSha.substring(0, 8) }}</span>
    </mat-list-item>
  }
</mat-nav-list>
