<mat-nav-list>
  @for (review of reviews(); track review.id) {
    <mat-list-item>
      <app-ai-review-status-badge [status]="review.status" matListItemIcon />
      <span matListItemTitle>Score: {{ review.score ?? '—' }}</span>
      <span matListItemLine>{{ review.createdAt | date: 'medium' }} — {{ review.commitSha.substring(0, 8) }}</span>
    </mat-list-item>
  }
</mat-nav-list>
