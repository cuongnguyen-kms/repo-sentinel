<div class="editor-layout" *transloco="let t">
  <div class="editor-main">
    <textarea
      #textareaEl
      class="template-textarea"
      spellcheck="false"
      [rows]="rows()"
      [ngModel]="value()"
      (ngModelChange)="value.set($event)"
      [disabled]="disabled()"
    ></textarea>

    <div class="editor-actions">
      <button mat-stroked-button type="button" (click)="resetToDefault()" [disabled]="disabled()">{{ t('settings.editor.resetToDefault') }}</button>
      <button mat-stroked-button type="button" (click)="togglePreview()">{{ showPreview() ? t('settings.editor.hidePreview') : t('settings.editor.showPreview') }}</button>
    </div>

    @if (showPreview()) {
      <div class="preview-box">
        <p class="preview-label">{{ t('settings.editor.previewLabel') }}</p>
        <pre>{{ previewText() }}</pre>
      </div>
    }
  </div>

  @if (variables().length > 0) {
    <div class="variable-panel">
      <p class="panel-label">{{ t('settings.editor.variablesLabel') }}</p>
      @for (v of variables(); track v.name) {
        <button
          type="button"
          class="variable-item"
          [title]="t('settings.editor.exampleTitle', { example: v.example })"
          [disabled]="disabled()"
          (click)="insertVariable(v.name)"
        >
          <span class="var-name">{{ v.name }}</span>
          <span class="var-desc">{{ v.description }}</span>
        </button>
      }
    </div>
  }
</div>
