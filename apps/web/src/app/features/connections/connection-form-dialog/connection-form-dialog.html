<ng-container *transloco="let t">
  <h2 mat-dialog-title>{{ t('connections.form.title') }}</h2>
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ t('connections.form.hostname') }}</mat-label>
      <input matInput [placeholder]="t('connections.form.hostnamePlaceholder')" [ngModel]="hostname()" (ngModelChange)="hostname.set($event)" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ t('connections.form.username') }}</mat-label>
      <input matInput [ngModel]="username()" (ngModelChange)="username.set($event)" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ t('connections.form.token') }}</mat-label>
      <input matInput type="password" [ngModel]="token()" (ngModelChange)="token.set($event)" autocomplete="new-password" />
    </mat-form-field>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">{{ t('common.cancel') }}</button>
    <button mat-flat-button color="primary" (click)="submit()" [disabled]="saving()">
      @if (saving()) {
        <mat-spinner diameter="18"></mat-spinner>
      } @else {
        {{ t('common.create') }}
      }
    </button>
  </mat-dialog-actions>
</ng-container>
