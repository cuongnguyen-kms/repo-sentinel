<button mat-icon-button [matMenuTriggerFor]="notifMenu" (menuOpened)="onMenuOpened()" aria-label="Notifications">
  <mat-icon [matBadge]="notificationsService.unreadCount() || null" matBadgeColor="warn" matBadgeSize="small">
    notifications
  </mat-icon>
</button>
<mat-menu #notifMenu="matMenu" class="notif-menu">
  <div class="notif-header" (click)="$event.stopPropagation()">
    <span>Notifications</span>
    <button mat-button (click)="markAllRead()">Mark all read</button>
  </div>
  @if (notificationsService.notifications().length === 0) {
    <button mat-menu-item disabled>No notifications</button>
  } @else {
    @for (n of notificationsService.notifications(); track n.id) {
      <button mat-menu-item disabled class="notif-item">
        <div>
          <div class="notif-title">{{ n.title }}</div>
          <div class="notif-time">{{ n.createdAt | date: 'short' }}</div>
        </div>
      </button>
    }
  }
</mat-menu>
